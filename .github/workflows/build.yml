name: SonarQube + Docker Build

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    services:
      mysql_server:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.DB_NAME }}
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for MySQL
        run: |
          while ! mysqladmin ping -h"127.0.0.1" -P"3306" --silent; do
            sleep 1
          done

      - name: Create database
        run: mysql -h 127.0.0.1 -u root -p${{ secrets.DB_PASSWORD }} ${{ secrets.DB_NAME }} < infra/script.sql

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'zulu'

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build and analyze with SonarQube
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=orhan54_springbootAPI

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: package
          path: target/*.jar
          retention-days: 1

  docker-build-image-api:
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      # Checkout du repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # [Optionnel] Installation d'outils Docker complémentaires
      - name: Set Up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Connection au Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # Récupération de l'artefact
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: package
          path: target

      # [Optionnel] Contrôle de la présence de l'artefact
      - name: Verify artifact presence
        run: |
          echo "Vérification de la présence de l'artefact..."
          ls -la target/
          if [ ! -f target/*.jar ]; then
            echo "Erreur: Aucun fichier JAR trouvé dans target/!"
            exit 1
          fi
          echo "Artefact JAR trouvé avec succès!"
          echo "Fichier(s) trouvé(s):"
          ls -lh target/*.jar

      # Construction de l'image Docker
      - name: Build Docker image
        run: |
          docker buildx build \
            --file Dockerfile \
            --tag ${{ secrets.DOCKERHUB_USER }}/api2026:latest \
            --load .

      # Push de l'image sur le Docker Hub
      - name: Push Docker image to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
              ${{ secrets.DOCKERHUB_USER }}/api2026:latest
              ${{ secrets.DOCKERHUB_USER }}/api2026:${{ github.sha }}

      # Affichage du message de succès
      - name: Display success message
        run: |
          echo "BUILD ET PUSH RÉUSSIS!"
          echo "Image Docker créée et poussée avec succès:"
          echo "${{ secrets.DOCKERHUB_USER }}/api2026:latest"
          echo "L'image est maintenant disponible sur Docker Hub"