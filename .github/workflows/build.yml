name: SonarQube
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    services:
      mysql_server:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.DB_NAME }}
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      # test d'attente de mise en service du conteneur Mysql
        - name: wait_for_MySQL_to_be_ready
          run: |
            while ! mysqladmin ping -h"127.0.0.1" -P"3306" --silent; do
              sleep 1
            done

        # recopie du depot dans l'executeur
        - uses: actions/checkout@v4
          with:
            fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

        - name: Set Up QEMU
          uses: docker/setup-qemu-action@v3

        - name: Set Up Docker Build
          uses: docker/setup-buildx-action@v3

        - name: Create database
          run: mysql -h 127.0.0.1 -u root -p${{ secrets.DB_PASSWORD }} ${{ secrets.DB_NAME }} < infra/script.sql

        - name: Set up JDK 21
          uses: actions/setup-java@v4
          with:
            java-version: 21
            distribution: 'zulu' # Alternative distribution options are available.

        - name: Cache SonarQube packages
          uses: actions/cache@v4
          with:
            path: ~/.sonar/cache
            key: ${{ runner.os }}-sonar
            restore-keys: ${{ runner.os }}-sonar

        - name: Cache Maven packages
          uses: actions/cache@v4
          with:
            path: ~/.m2
            key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
            restore-keys: ${{ runner.os }}-m2

        - name: Deploy_Allure_Report_to_GitHub_Pages
          if: always()
          uses: peaceiris/actions-gh-pages@v3
          with:
            github_token: ${{ secrets.PERSONAL_TOKEN_ALLURE }}
            publish_dir: target/site/allure-maven-plugin
            destination_dir: allure-report
            keep_files: 'false'

        - name: Build_and_analyze
          env:
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          run: mvn -B clean verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=orhan54_springbootAPI

      # Générer rapport Allure
        - name: Generate Allure Report
          run: mvn allure:report

      # Déployer rapport sur GitHub Pages
        - name: Deploy_Allure_Report_to_Github_Pages
          if: always()
          uses: peaceiris/actions-gh-pages@v3
          with:
            github_token: ${{ secrets.GITHUB_TOKEN }}
            publish_dir: target/site/allure-maven-plugin
            destination_dir: allure-report
            keep_files: false

        - name: Charging_artefact
          uses: actions/upload-artifact@v5
          with:
            name: package
            path: target/*.jar
            retention-days: 1

        # construction de l'image docker et push sur dockerHub
        - name: Build and push
          uses: docker/build-push-action@v5
          with:
            context: .
            file: Dockerfile
            push: true
            tags: ${{ secrets.DOCKERHUB_USER }}/api2026:latest

        # message de fin indiquant que tout s'est bien passe
        - run: echo "This job's status is ${{ job.status }}
